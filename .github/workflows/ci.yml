name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Docs, Scripts, and Logic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in \
            index.html \
            js/app.js \
            js/api.js \
            js/config.js \
            js/conversation-utils.js \
            scripts/check_markdown.py \
            scripts/mock_api.py \
            scripts/run_smoke.sh \
            tests/conversation-utils.test.mjs \
            tests/smoke.html; do
            if [ ! -f "$f" ]; then
              echo "FAIL: Missing $f"
              exit 1
            fi
          done

      - name: Validate HTML structure
        run: |
          grep -q '<!DOCTYPE html>' index.html || { echo "FAIL: Missing DOCTYPE"; exit 1; }
          grep -q '<html' index.html || { echo "FAIL: Missing <html> tag"; exit 1; }
          grep -q '</html>' index.html || { echo "FAIL: Missing </html> tag"; exit 1; }
          grep -q '<head' index.html || { echo "FAIL: Missing <head> tag"; exit 1; }
          grep -q '<body' index.html || { echo "FAIL: Missing <body> tag"; exit 1; }

      - name: Check Markdown links and placeholders
        run: python3 scripts/check_markdown.py

      - name: Verify repository identity in docs
        run: |
          # Check that clone URLs use the correct repository
          if grep -q 'your-username' README.md CONTRIBUTING.md; then
            echo "FAIL: Found placeholder 'your-username' in documentation"
            exit 1
          fi

          # Verify correct repository name in clone commands
          if ! grep -q 'ShuaiShuai03/zhida-ai' README.md; then
            echo "FAIL: README.md missing correct repository clone URL"
            exit 1
          fi

          # Check that GitHub UI relative paths are not used
          if grep -qE '\.\./\.\./issues|\.\./\.\./security|\.\./\.\./actions' README.md CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md; then
            echo "FAIL: Found GitHub UI relative paths (../../) in documentation"
            exit 1
          fi

      - name: Check for hardcoded secrets
        run: |
          if grep -qP "DEFAULT_API_KEY\s*=\s*'[^']{10,}'" js/config.js; then
            echo "FAIL: js/config.js contains a hardcoded API key!"
            exit 1
          fi
          if grep -qP "DEFAULT_API_BASE_URL\s*=\s*'https?://[^']+'" js/config.js; then
            echo "FAIL: js/config.js contains a hardcoded API URL!"
            exit 1
          fi

      - name: Validate shell and Python scripts
        run: |
          bash -n scripts/start.sh
          bash -n scripts/run_smoke.sh
          python3 -m py_compile scripts/check_markdown.py scripts/mock_api.py

      - name: Validate PowerShell script when pwsh is available
        run: |
          if command -v pwsh >/dev/null 2>&1; then
            pwsh -NoProfile -Command "[void][System.Management.Automation.Language.Parser]::ParseFile('scripts/start.ps1',[ref]$null,[ref]$null)"
          else
            echo "pwsh not installed; skipping PowerShell syntax check"
          fi

      - name: Validate JavaScript syntax
        run: |
          for f in js/*.js; do
            node --check "$f"
          done

      - name: Run unit tests
        run: node --test tests/*.test.mjs

  smoke:
    name: Browser Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Chrome availability
        run: google-chrome --version
      - name: Run smoke test
        run: bash scripts/run_smoke.sh

  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t zhida-ai-test .
      - name: Verify container starts
        run: |
          docker run -d --name test-container -p 8080:80 zhida-ai-test
          sleep 2
          curl -f http://localhost:8080/ || exit 1
          docker stop test-container
