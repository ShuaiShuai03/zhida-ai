<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhida AI Smoke Test</title>
</head>
<body data-smoke-result="running">
  <pre id="log">Running smoke test…</pre>
  <iframe
    id="app-frame"
    src="/index.html"
    title="Zhida AI Smoke App"
    style="width: 1280px; height: 900px; border: 0;"
  ></iframe>

  <script type="module">
    import { sanitizeHTML } from '../js/utils.js';

    const logNode = document.getElementById('log');

    function log(message) {
      logNode.textContent += `\n${message}`;
    }

    function fail(message) {
      document.body.dataset.smokeResult = 'fail';
      log(`FAIL: ${message}`);
      throw new Error(message);
    }

    function click(element) {
      element.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    }

    function inputValue(element, value) {
      element.focus();
      element.value = value;
      element.dispatchEvent(new Event('input', { bubbles: true }));
      element.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function findByText(selector, text, root = document) {
      return Array.from(root.querySelectorAll(selector))
        .find((node) => node.textContent.includes(text));
    }

    async function waitFor(predicate, label, timeout = 8000) {
      const startedAt = Date.now();
      while (Date.now() - startedAt < timeout) {
        const result = predicate();
        if (result) return result;
        await new Promise((resolve) => setTimeout(resolve, 50));
      }
      fail(`Timeout waiting for: ${label}`);
    }

    async function main() {
      localStorage.clear();

      const sanitized = sanitizeHTML('<a href="\tjavascript:alert(1)">bad</a><img src="\nJaVaScRiPt:alert(1)">');
      if (!sanitized.includes('href="#"') || sanitized.includes('src=')) {
        fail('sanitizer should block whitespace-obfuscated javascript URLs');
      }

      const frame = document.getElementById('app-frame');
      await new Promise((resolve) => frame.addEventListener('load', resolve, { once: true }));

      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      if (!doc || !win) fail('iframe not accessible');
      win.confirm = () => true;
      win.prompt = () => 'smokeTag';

      await waitFor(() => doc.querySelector('#chat-input'), 'app init');
      await waitFor(() => doc.querySelector('#theme-toggle')?.innerHTML.trim(), 'theme icon render');

      if (doc.querySelector('#settings-modal')?.getAttribute('aria-modal') !== 'true') {
        fail('settings modal should declare aria-modal');
      }
      if (doc.querySelector('#model-trigger')?.getAttribute('aria-controls') !== 'model-list') {
        fail('model trigger should be bound to the listbox');
      }
      await waitFor(
        () => doc.querySelector('#file-input')?.accept.includes('.tsx'),
        'file input accept includes .tsx'
      );
      const composer = doc.querySelector('.composer');
      if (!composer || !composer.contains(doc.querySelector('#upload-btn')) || !composer.contains(doc.querySelector('#send-btn'))) {
        fail('upload, textarea, and send controls should share one composer container');
      }
      const composerFooter = doc.querySelector('.composer__footer');
      if (
        !composerFooter ||
        !composerFooter.contains(doc.querySelector('#send-btn')) ||
        !composerFooter.contains(doc.querySelector('#stop-btn'))
      ) {
        fail('send and stop buttons should live directly in the composer footer');
      }
      if (doc.querySelector('#send-btn button') || doc.querySelector('#stop-btn button')) {
        fail('composer footer actions should not contain nested buttons');
      }
      const textareaRect = doc.querySelector('#chat-input').getBoundingClientRect();
      const sendRect = doc.querySelector('#send-btn').getBoundingClientRect();
      if (!(sendRect.top >= textareaRect.bottom)) {
        fail('composer controls should place send below textarea');
      }
      if (!doc.querySelector('#web-search-toggle') || !doc.querySelector('#reasoning-effort-select')) {
        fail('composer should include web search and reasoning controls');
      }
      if (sendRect.width < 36 || sendRect.width > 56) {
        fail('send button should be a compact circular action');
      }
      if (!doc.querySelector('#send-btn')?.disabled) {
        fail('empty composer should disable the send button');
      }
      click(doc.querySelector('#send-btn'));
      await new Promise((resolve) => setTimeout(resolve, 100));
      if (doc.querySelectorAll('.message--user').length !== 0) {
        fail('disabled send button should not send an empty message');
      }
      frame.style.width = '390px';
      await new Promise((resolve) => setTimeout(resolve, 50));
      const mobileFooterRect = doc.querySelector('.composer__footer').getBoundingClientRect();
      const mobileSendRect = doc.querySelector('#send-btn').getBoundingClientRect();
      if (mobileSendRect.width > mobileFooterRect.width + 1 || mobileSendRect.right > mobileFooterRect.right + 1) {
        fail('mobile send button should fit inside the composer footer');
      }
      if (mobileSendRect.left < -1 || mobileSendRect.right > win.innerWidth + 1) {
        fail('mobile send button should fit inside the viewport');
      }
      frame.style.width = '1280px';
      await new Promise((resolve) => setTimeout(resolve, 50));

      click(doc.querySelector('#settings-btn'));
      await waitFor(
        () => doc.querySelector('#settings-modal')?.classList.contains('visible'),
        'settings modal open'
      );

      inputValue(doc.querySelector('#settings-api-base-url'), 'http://127.0.0.1:11434/v1');
      inputValue(doc.querySelector('#settings-api-key'), 'smoke-key');
      click(doc.querySelector('#fetch-models-btn'));

      await waitFor(
        () => doc.body.textContent.includes('已获取 3 个可用模型'),
        'save config and fetch models toast'
      );
      await waitFor(
        () => doc.querySelector('#settings-api-key')?.value === '',
        'api key field cleared after config save'
      );
      const storedSettingsAfterConfig = JSON.parse(win.localStorage.getItem('ai_chat_settings') || '{}');
      if ('apiKey' in storedSettingsAfterConfig) {
        fail('localStorage settings should not contain apiKey');
      }

      click(doc.querySelector('#settings-modal .modal__close'));
      await waitFor(
        () => doc.querySelector('#settings-modal')?.getAttribute('aria-hidden') === 'true',
        'settings modal close'
      );

      click(doc.querySelector('#settings-btn'));
      await waitFor(
        () => doc.querySelector('#settings-modal')?.classList.contains('visible'),
        'settings modal reopen'
      );
      click(doc.querySelector('#settings-save-btn'));

      await waitFor(
        () => JSON.parse(win.localStorage.getItem('ai_chat_settings') || '{}').apiBaseUrl === 'http://127.0.0.1:11434',
        'settings persisted'
      );
      if ('apiKey' in JSON.parse(win.localStorage.getItem('ai_chat_settings') || '{}')) {
        fail('settings save should not persist apiKey');
      }

      click(doc.querySelector('#model-trigger'));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'true',
        'model selector expanded'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.model-selector__item')).some((item) => item.textContent.includes('Smoke Standard')),
        'mock model option render'
      );
      const thinkingOption = findByText('.model-selector__item', 'Smoke Thinking', doc);
      if (!thinkingOption) {
        fail('mock thinking model option should render');
      }
      click(thinkingOption);
      await waitFor(
        () => doc.querySelector('#model-trigger')?.textContent.includes('Smoke Thinking'),
        'thinking model selected'
      );
      click(doc.querySelector('#model-trigger'));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'true',
        'model selector expanded again'
      );
      click(findByText('.model-selector__item', 'Smoke Standard', doc));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'false',
        'model selector collapsed'
      );

      click(doc.querySelector('#new-chat-btn'));
      click(doc.querySelector('#model-trigger'));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'true',
        'model selector open for conversation model test'
      );
      click(findByText('.model-selector__item', 'Smoke Thinking', doc));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.textContent.includes('Smoke Thinking'),
        'conversation model set to thinking'
      );
      inputValue(doc.querySelector('#chat-input'), 'echo model first');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('model: smoke-thinking')),
        'thinking model stays on chat completions for first conversation'
      );

      click(doc.querySelector('#new-chat-btn'));
      click(doc.querySelector('#model-trigger'));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'true',
        'model selector open for standard conversation'
      );
      click(findByText('.model-selector__item', 'Smoke Standard', doc));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.textContent.includes('Smoke Standard'),
        'standard model selected'
      );
      inputValue(doc.querySelector('#chat-input'), 'echo model standard');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('model: smoke-standard')),
        'standard model used for second conversation'
      );

      const thinkingConversation = findByText('.conversation-item', 'echo model first', doc);
      if (!thinkingConversation) {
        fail('thinking conversation should be in sidebar');
      }
      click(thinkingConversation);
      await waitFor(
        () => doc.querySelector('#model-trigger')?.textContent.includes('Smoke Thinking'),
        'switching conversation restores its model'
      );
      inputValue(doc.querySelector('#chat-input'), 'echo model after switch');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content'))
          .filter((node) => node.textContent.includes('model: smoke-thinking')).length >= 2,
        'restored thinking conversation keeps its chat-completions model for follow-up'
      );

      click(doc.querySelector('#model-trigger'));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.getAttribute('aria-expanded') === 'true',
        'model selector open before standard chat'
      );
      click(findByText('.model-selector__item', 'Smoke Standard', doc));
      await waitFor(
        () => doc.querySelector('#model-trigger')?.textContent.includes('Smoke Standard'),
        'standard model restored before basic chat'
      );

      click(doc.querySelector('#new-chat-btn'));
      inputValue(doc.querySelector('#chat-input'), 'hello smoke');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Smoke test reply')),
        'basic AI reply'
      );

      click(doc.querySelector('#input-template-btn'));
      await waitFor(
        () => doc.querySelector('#prompt-templates-modal')?.classList.contains('visible'),
        'prompt templates modal open'
      );
      inputValue(doc.querySelector('#prompt-template-name'), 'Smoke Template');
      inputValue(doc.querySelector('#prompt-template-content'), 'Template body {{text}}');
      doc.querySelector('#prompt-template-form').dispatchEvent(new Event('submit', { bubbles: true, cancelable: true }));
      await waitFor(
        () => findByText('.template-item', 'Smoke Template', doc),
        'custom template rendered'
      );
      const smokeTemplate = findByText('.template-item', 'Smoke Template', doc);
      click(smokeTemplate.querySelector('[data-template-action="insert"]'));
      await waitFor(
        () => doc.querySelector('#chat-input')?.value.includes('Template body {{text}}'),
        'template inserted into input'
      );
      inputValue(doc.querySelector('#chat-input'), '');

      const activeHelloConversation = findByText('.conversation-item.active', 'hello smoke', doc);
      if (!activeHelloConversation) {
        fail('hello smoke conversation should be active');
      }
      click(activeHelloConversation.querySelector('.conversation-item__pin'));
      await waitFor(
        () => findByText('.conversation-item', 'hello smoke', doc)?.querySelector('.conversation-item__pin')?.getAttribute('aria-pressed') === 'true',
        'conversation pinned'
      );
      click(findByText('.conversation-item', 'hello smoke', doc).querySelector('.conversation-item__tags-btn'));
      await waitFor(
        () => findByText('.conversation-item', '#smokeTag', doc),
        'conversation tag rendered'
      );
      inputValue(doc.querySelector('#sidebar-search'), '#smokeTag');
      await waitFor(
        () => doc.querySelectorAll('.conversation-item').length === 1 && findByText('.conversation-item', 'hello smoke', doc),
        'tag search filters conversations'
      );
      inputValue(doc.querySelector('#sidebar-search'), '');

      const aiCountBeforeSpecial = doc.querySelectorAll('.message--ai .message__content').length;
      inputValue(doc.querySelector('#chat-input'), 'copy <div>&" check');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => findByText('.message--user', 'copy <div>&" check', doc),
        'special character user message rendered'
      );
      const specialUserMessage = findByText('.message--user', 'copy <div>&" check', doc);
      const userCopyButton = specialUserMessage?.querySelector('[data-action="copy"]');
      if (userCopyButton?.dataset.content !== 'copy <div>&" check') {
        fail('user copy data should preserve raw special characters');
      }
      await waitFor(
        () => doc.querySelectorAll('.message--ai .message__content').length > aiCountBeforeSpecial,
        'special character message gets a completed reply'
      );
      userCopyButton.focus();
      await waitFor(
        () => win.getComputedStyle(specialUserMessage.querySelector('.message__actions')).opacity === '1',
        'message actions visible on keyboard focus'
      );

      if (!doc.querySelector('#reasoning-effort-select')?.disabled) {
        fail('standard model should disable reasoning depth control');
      }
      if (!doc.querySelector('#web-search-toggle')?.disabled) {
        fail('chat-only standard model should disable web search');
      }
      doc.querySelector('#web-search-toggle').checked = true;
      doc.querySelector('#web-search-toggle').dispatchEvent(new Event('change', { bubbles: true }));
      if (doc.querySelector('#web-search-toggle')?.checked) {
        fail('disabled web search toggle should remain unchecked for chat-only model');
      }
      click(doc.querySelector('#model-trigger'));
      const responsesOptionForSearch = await waitFor(
        () => findByText('.model-selector__item', 'GPT 5.5 Smoke', doc),
        'responses-capable model option for search'
      );
      click(responsesOptionForSearch);
      await waitFor(
        () => !doc.querySelector('#web-search-toggle')?.disabled,
        'responses-capable model enables web search'
      );
      doc.querySelector('#web-search-toggle').checked = true;
      doc.querySelector('#web-search-toggle').dispatchEvent(new Event('change', { bubbles: true }));
      inputValue(doc.querySelector('#chat-input'), 'web search check');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Responses search reply')),
        'web search responses reply'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Example Source')),
        'responses citation rendered'
      );
      doc.querySelector('#web-search-toggle').checked = false;
      doc.querySelector('#web-search-toggle').dispatchEvent(new Event('change', { bubbles: true }));

      await waitFor(
        () => !doc.querySelector('#reasoning-effort-select')?.disabled,
        'responses-capable model enables reasoning depth'
      );
      inputValue(doc.querySelector('#reasoning-effort-select'), 'high');
      inputValue(doc.querySelector('#chat-input'), 'reasoning check');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('reasoning: high')),
        'reasoning effort forwarded to responses'
      );
      click(doc.querySelector('#model-trigger'));
      const standardOption = await waitFor(
        () => findByText('.model-selector__item', 'Smoke Standard', doc),
        'standard model option'
      );
      click(standardOption);

      click(doc.querySelector('#new-chat-btn'));
      inputValue(doc.querySelector('#chat-input'), 'slow response please');
      click(doc.querySelector('#send-btn'));
      await waitFor(
        () => !doc.querySelector('#stop-btn')?.classList.contains('hidden'),
        'stop button visible'
      );
      const activeStopRect = doc.querySelector('#stop-btn').getBoundingClientRect();
      if (!doc.querySelector('#send-btn')?.classList.contains('hidden')) {
        fail('send button should be hidden while stop button is visible');
      }
      if (activeStopRect.width < 96) {
        fail('stop button should remain large enough while generating');
      }
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Partial')),
        'partial response visible'
      );
      click(doc.querySelector('.stop-btn__label'));

      inputValue(doc.querySelector('#chat-input'), 'follow up after stop');
      click(doc.querySelector('#send-btn'));

      await waitFor(
        () => doc.querySelectorAll('.message--user').length >= 2,
        'follow-up user message appended'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Smoke test reply')),
        'follow-up reply after abort'
      );
      await waitFor(
        () => doc.querySelector('#stop-btn')?.classList.contains('hidden'),
        'stop button hidden after follow-up completes'
      );

      click(doc.querySelector('#new-chat-btn'));
      await waitFor(
        () => doc.querySelectorAll('.conversation-item').length >= 2,
        'conversation list updated'
      );
      const previousConversation = Array.from(doc.querySelectorAll('.conversation-item'))
        .find((item) => item.textContent.includes('slow response please'));
      if (!previousConversation) {
        fail('previous conversation should remain in the sidebar after rerender');
      }
      click(previousConversation);
      const activePreviousConversation = await waitFor(
        () => findByText('.conversation-item.active', 'slow response please', doc),
        'previous conversation active in sidebar'
      );
      const deleteButton = activePreviousConversation.querySelector('.conversation-item__delete');
      deleteButton.focus();
      await waitFor(
        () => win.getComputedStyle(deleteButton).opacity === '1',
        'conversation delete visible on keyboard focus'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Partial')),
        'partial response persisted after rerender'
      );

      const aiMessages = Array.from(doc.querySelectorAll('.message--ai .message__content'))
        .map((node) => node.textContent.trim())
        .filter(Boolean);
      if (!aiMessages.some((text) => text.includes('Partial'))) {
        fail('partial response should persist after manual stop');
      }
      if (!aiMessages.some((text) => text.includes('Smoke test reply'))) {
        fail('follow-up response should complete after aborting the previous stream');
      }
      if (doc.querySelector('.loading-indicator')) {
        fail('loading indicator should be cleaned up after abort and follow-up send');
      }

      const backup = {
        version: 1,
        exportedAt: '2026/05/13 12:00:00',
        settings: JSON.parse(win.localStorage.getItem('ai_chat_settings') || '{}'),
        conversations: JSON.parse(win.localStorage.getItem('ai_chat_conversations') || '[]'),
        activeConversationId: JSON.parse(win.localStorage.getItem('ai_chat_active_id') || 'null'),
        selectedModelId: JSON.parse(win.localStorage.getItem('ai_chat_model') || 'null'),
        models: JSON.parse(win.localStorage.getItem('ai_chat_models') || '[]'),
        promptTemplates: JSON.parse(win.localStorage.getItem('ai_chat_prompt_templates') || '[]'),
      };
      if ('apiKey' in backup.settings) {
        fail('backup settings should not contain apiKey');
      }

      click(doc.querySelector('#clear-all-btn'));
      await waitFor(
        () => doc.querySelector('#confirm-modal')?.classList.contains('visible'),
        'clear all confirmation visible'
      );
      click(doc.querySelector('#confirm-ok-btn'));
      await waitFor(
        () => doc.querySelectorAll('.conversation-item').length === 0,
        'conversations cleared before import'
      );
      win.localStorage.removeItem('ai_chat_prompt_templates');

      click(doc.querySelector('#data-management-btn'));
      await waitFor(
        () => doc.querySelector('#data-management-modal')?.classList.contains('visible'),
        'data management modal open'
      );
      const file = new win.File([JSON.stringify(backup)], 'backup.json', { type: 'application/json' });
      const transfer = new win.DataTransfer();
      transfer.items.add(file);
      const importInput = doc.querySelector('#import-data-input');
      importInput.files = transfer.files;
      importInput.dispatchEvent(new Event('change', { bubbles: true }));
      await waitFor(
        () => findByText('.conversation-item', 'hello smoke', doc),
        'conversation restored after data import'
      );
      click(doc.querySelector('#data-management-modal .modal__close'));
      click(doc.querySelector('#prompt-templates-btn'));
      await waitFor(
        () => findByText('.template-item', 'Smoke Template', doc),
        'custom template restored after data import'
      );

      document.body.dataset.smokeResult = 'pass';
      log('PASS');
    }

    main().catch((error) => {
      document.body.dataset.smokeResult = 'fail';
      log(error?.stack || String(error));
    });
  </script>
</body>
</html>
