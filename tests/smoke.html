<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zhida AI Smoke Test</title>
</head>
<body data-smoke-result="running">
  <pre id="log">Running smoke test…</pre>
  <iframe
    id="app-frame"
    src="/index.html"
    title="Zhida AI Smoke App"
    style="width: 1280px; height: 900px; border: 0;"
  ></iframe>

  <script type="module">
    import { renderMarkdown } from '../js/markdown.js';
    import { sanitizeHTML } from '../js/utils.js';

    const DEFAULT_WAIT_TIMEOUT = 60000;
    const logNode = document.getElementById('log');

    function log(message) {
      logNode.textContent += `\n${message}`;
    }

    function fail(message) {
      document.body.dataset.smokeResult = 'fail';
      log(`FAIL: ${message}`);
      throw new Error(message);
    }

    function click(element) {
      element.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    }

    function inputValue(element, value) {
      element.focus();
      element.value = value;
      element.dispatchEvent(new Event('input', { bubbles: true }));
      element.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function requireElement(selector, root = document, context = 'DOM 查找') {
      const element = root.querySelector(selector);
      if (!element) {
        fail(`${context}: 未找到元素 ${selector}`);
      }
      return element;
    }

    function safeText(selector, root = document) {
      const element = root.querySelector(selector);
      return element ? element.textContent || '' : '';
    }

    function safeInnerHTML(selector, root = document) {
      const element = root.querySelector(selector);
      return element ? element.innerHTML || '' : '';
    }

    function safeAttr(selector, attr, root = document) {
      const element = root.querySelector(selector);
      return element ? (element.getAttribute(attr) || '') : '';
    }

    function safeValue(selector, root = document) {
      const element = root.querySelector(selector);
      return element ? (element.value || '') : '';
    }

    function findByText(selector, text, root = document) {
      return Array.from(root.querySelectorAll(selector))
        .find((node) => node.textContent.includes(text));
    }

    function findByTextOrFail(selector, text, root = document, context = '文本查找') {
      const node = findByText(selector, text, root);
      if (!node) fail(`${context}: 未找到文本 "${text}" 的 ${selector}`);
      return node;
    }

    function clickBySelector(selector, root = document, context = '点击元素') {
      click(requireElement(selector, root, context));
    }

    function inputBySelector(selector, value, root = document, context = '输入值') {
      inputValue(requireElement(selector, root, context), value);
    }

    function assertNoHorizontalOverflow(win, doc, context) {
      const scrollWidth = Math.max(doc.documentElement.scrollWidth, doc.body.scrollWidth);
      if (scrollWidth > win.innerWidth + 1) {
        fail(`${context}: 页面宽度 ${scrollWidth}px 超出视口 ${win.innerWidth}px`);
      }
    }

    function assertUsableAfterInteraction(win, button, context) {
      const actionHost = button.closest('.conversation-item');
      if (actionHost) {
        actionHost.dispatchEvent(new MouseEvent('mouseover', {
          bubbles: true,
          cancelable: true,
        }));
        actionHost.dispatchEvent(new MouseEvent('mouseenter', {
          bubbles: true,
          cancelable: true,
        }));
      }

      const hoverOpacity = Number.parseFloat(win.getComputedStyle(button).opacity || '0');
      button.focus({ preventScroll: true });
      const focusOpacity = Number.parseFloat(win.getComputedStyle(button).opacity || '0');
      if (hoverOpacity <= 0 && focusOpacity <= 0) {
        fail(`${context}: 会话项操作按钮在 hover/focus 后仍不可用`);
      }
    }

    function dispatchBySelector(selector, event, root = document, context = '触发事件') {
      requireElement(selector, root, context).dispatchEvent(event);
    }

    async function attachTextFileDuringSmoke(win, doc, filename, content) {
      const fileInput = requireElement('#file-input', doc, '准备上传测试附件');
      const dataTransfer = new win.DataTransfer();
      dataTransfer.items.add(new win.File([content], filename, { type: 'text/plain' }));
      fileInput.files = dataTransfer.files;
      fileInput.dispatchEvent(new Event('change', { bubbles: true }));
      await waitFor(
        () => findByText('.attachment-chip', filename, doc),
        `attachment ${filename} rendered`
      );
    }

    function parsePxPx(value, context = '样式值') {
      const num = Number.parseFloat(value);
      if (!Number.isFinite(num)) {
        fail(`${context}: 无法解析像素值 "${value}"`);
      }
      return num;
    }

    function assertRoundRadii(label, element, root = document, options = {}) {
      const { allowZero = false } = options;
      const style = root.defaultView.getComputedStyle(element);
      const radiusValues = [
        parsePxPx(style.borderTopLeftRadius, `${label}: borderTopLeftRadius`),
        parsePxPx(style.borderTopRightRadius, `${label}: borderTopRightRadius`),
        parsePxPx(style.borderBottomRightRadius, `${label}: borderBottomRightRadius`),
        parsePxPx(style.borderBottomLeftRadius, `${label}: borderBottomLeftRadius`)
      ];
      if (!allowZero && radiusValues.some((value) => value <= 0)) {
        fail(`${label}: 关键圆角当前值为 0 或无效`);
      }
      if (allowZero && radiusValues.every((value) => value <= 0)) {
        return 0;
      }

      const [minRadius, maxRadius] = [Math.min(...radiusValues), Math.max(...radiusValues)];
      if (maxRadius - minRadius > 0.5) {
        fail(`${label}: 四角圆角不一致`);
      }
      return minRadius;
    }

    function assertDesignRadiusConsistency(win, doc) {
      const rootStyle = win.getComputedStyle(win.document.documentElement);
      const tokenNames = ['--radius-sm', '--radius-md', '--radius-lg', '--radius-xl', '--radius-full'];
      const tokenPx = {};

      for (const tokenName of tokenNames) {
        const tokenValue = rootStyle.getPropertyValue(tokenName).trim();
        tokenPx[tokenName] = parsePxPx(tokenValue || '0', `设计 token ${tokenName}`);
        if (tokenPx[tokenName] <= 0) {
          fail(`设计 token ${tokenName} 应为正值，当前值 ${tokenValue}`);
        }
      }

      const composerRadius = assertRoundRadii('composer 圆角', requireElement('.composer', doc, '检查 composer 圆角'), doc);
      const textareaRadius = assertRoundRadii('textarea 圆角', requireElement('#chat-input', doc, '检查输入框圆角'), doc);
      const sendRadius = assertRoundRadii('发送按钮圆角', requireElement('#send-btn', doc, '检查发送按钮圆角'), doc);
      const stopRadius = assertRoundRadii('停止按钮圆角', requireElement('#stop-btn', doc, '检查停止按钮圆角'), doc);

      if (composerRadius < 1) {
        fail('composer 圆角在运行时应大于 0');
      }
      if (sendRadius < 1 || stopRadius < 1) {
        fail('send/stop 按钮圆角在运行时应大于 0');
      }
      if (textareaRadius < 1) {
        fail('textarea 圆角在运行时应大于 0');
      }
      if (Math.abs(sendRadius - stopRadius) > 0.5) {
        fail('send/stop 按钮圆角应保持一致');
      }
    }

    function assertFocusVisible(root, selector, context) {
      const element = requireElement(selector, root, context);
      root.defaultView.dispatchEvent(new KeyboardEvent('keydown', {
        key: 'Tab',
        code: 'Tab',
        bubbles: true
      }));
      element.focus({ preventScroll: true });
      const isFocused = root.activeElement === element || element.matches(':focus') || element.matches(':focus-visible');
      if (!isFocused) {
        fail(`${context}: 元素未能获得焦点`);
      }
      const style = root.defaultView.getComputedStyle(element);
      const outlineWidth = parsePxPx(style.outlineWidth || '0', `${context}: outlineWidth`);
      const hasFocusIndicator = outlineWidth > 0 || style.outlineStyle !== 'none' || (style.boxShadow && style.boxShadow !== 'none');
      const hasFocusVisible = element.matches(':focus-visible');
      if (!hasFocusIndicator && !hasFocusVisible && !isFocused) {
        fail(`${context}: focus-visible 可见性检查失败`);
      }
      return element;
    }

    function assertElementsExist(root, selectors, context) {
      for (const selector of selectors) {
        requireElement(selector, root, `${context}: ${selector}`);
      }
    }

    function assertEnhancedSelectHidden(root, selector, context) {
      const select = requireElement(selector, root, context);
      const customSelect = select.parentElement?.querySelector(`.custom-select[data-select-id="${select.id}"]`);
      if (!customSelect?.querySelector('.custom-select__trigger')) {
        fail(`${context}: 自定义 select 控件未渲染`);
      }
      if (!select.hidden || select.tabIndex !== -1 || select.getAttribute('aria-hidden') !== 'true') {
        fail(`${context}: 原生 select 应从键盘 Tab 顺序和辅助技术树中移除`);
      }
    }

    async function waitForAppReady(frame, timeout = 20000) {
      const doc = await waitForFrameReady(frame, timeout);
      await waitFor(
        () => doc.querySelector('#chat-input'),
        'app ready (initial UI mounted)',
        timeout
      );
      await waitFor(
        () => doc.documentElement.dataset.appReady === 'true',
        'app ready marker',
        timeout
      );
      return doc;
    }

    async function reloadAppFrame(frame, timeout = 20000) {
      const previousDoc = frame.contentDocument;
      frame.contentWindow?.location.reload();
      await waitFor(
        () => frame.contentDocument && frame.contentDocument !== previousDoc,
        'iframe document replaced after reload',
        timeout
      );
      return waitForAppReady(frame, timeout);
    }

    async function waitForFrameReady(frame, timeout = 20000) {
      const frameLabel = `iframe ${frame.id || 'app-frame'}`;
      const targetPath = new URL(frame.src, window.location.href).pathname;

      const readyDoc = () => {
        const doc = frame.contentDocument;
        if (!doc || !frame.contentWindow) return null;
        const frameUrl = frame.contentWindow.location.href;
        if (frameUrl === 'about:blank') return null;
        const framePath = new URL(frameUrl, window.location.href).pathname;
        if (framePath !== targetPath) return null;
        return doc.readyState === 'interactive' || doc.readyState === 'complete' ? doc : null;
      };

      const existing = readyDoc();
      if (existing) return existing;

      const resolved = await new Promise((resolve) => {
        const interval = setInterval(() => {
          const loadedDoc = readyDoc();
          if (loadedDoc) {
            clearInterval(interval);
            clearTimeout(timeoutHandle);
            frame.removeEventListener('load', onLoad);
            resolve(loadedDoc);
          }
        }, 25);

        const onLoad = () => {
          const loadedDoc = readyDoc();
          if (loadedDoc) {
            clearInterval(interval);
            clearTimeout(timeoutHandle);
            frame.removeEventListener('load', onLoad);
            resolve(loadedDoc);
          }
        };

        const timeoutHandle = setTimeout(() => {
          clearInterval(interval);
          frame.removeEventListener('load', onLoad);
          resolve(null);
        }, timeout);

        frame.addEventListener('load', onLoad, { once: true });
      });

      if (!resolved) {
        fail(`${frameLabel} 在 ${timeout}ms 内未完成加载，当前 readyState=${frame.contentDocument?.readyState || 'unavailable'}`);
      }

      return resolved;
    }

    async function waitFor(predicate, label, timeout = DEFAULT_WAIT_TIMEOUT) {
      const startedAt = Date.now();
      while (Date.now() - startedAt < timeout) {
        const result = predicate();
        if (result) return result;
        await new Promise((resolve) => setTimeout(resolve, 50));
      }
      fail(`Timeout waiting for: ${label}`);
    }

    async function waitForComposerIdle(doc, label) {
      await waitFor(
        () => doc.querySelector('#stop-btn')?.classList.contains('hidden') && !doc.querySelector('.loading-indicator'),
        label
      );
    }

    function getFreshStateSnapshot(doc) {
      const messageArea = doc.querySelector('#chat-messages-inner');
      if (!messageArea) return null;

      if (messageArea.querySelector('.welcome-screen')) {
        return { kind: 'welcome' };
      }
      if (doc.querySelector('.conversation-list__empty')) {
        return { kind: 'list-empty' };
      }
      if (!doc.querySelector('.message--user')) {
        return { kind: 'no-users' };
      }
      return null;
    }

    function createChatSseChunk(text) {
      return `data: ${JSON.stringify({ choices: [{ delta: { content: text } }] })}\n\n`;
    }

    function createStreamingMarkdownResponse(win, onReadyToFinish) {
      const encoder = new win.TextEncoder();
      const stream = new win.ReadableStream({
        start(controller) {
          controller.enqueue(encoder.encode(createChatSseChunk('## Streaming Markdown\n```js\nconst answer = 42;')));
          onReadyToFinish(() => {
            controller.enqueue(encoder.encode(createChatSseChunk('\nconsole.log(answer);\n```\n\nInline math: $x + y$')));
            controller.enqueue(encoder.encode('data: [DONE]\n\n'));
            controller.close();
          });
        },
      });

      return new win.Response(stream, {
        status: 200,
        headers: { 'Content-Type': 'text/event-stream; charset=utf-8' },
      });
    }

    function installStreamingMarkdownFetchMock(win) {
      const originalFetch = win.fetch.bind(win);
      let intercepted = false;
      let finishStream = null;

      win.fetch = (resource, options = {}) => {
        const rawUrl = typeof resource === 'string' ? resource : resource?.url;
        const url = new URL(rawUrl, win.location.href);
        const body = String(options?.body || '');

        if (url.pathname === '/api/chat/completions' && body.includes('streaming markdown smoke')) {
          intercepted = true;
          return Promise.resolve(createStreamingMarkdownResponse(win, (finish) => {
            finishStream = finish;
          }));
        }

        return originalFetch(resource, options);
      };

      return {
        restore() {
          win.fetch = originalFetch;
        },
        wasIntercepted() {
          return intercepted;
        },
        finishStream() {
          if (!finishStream) {
            fail('streaming markdown smoke stream was not ready to finish');
          }
          const finish = finishStream;
          finishStream = null;
          finish();
        },
      };
    }

    function createAbortableSlowResponse(win, signal) {
      const encoder = new win.TextEncoder();
      let cleanupAbort = () => {};
      const stream = new win.ReadableStream({
        start(controller) {
          const abortStream = () => {
            cleanupAbort();
            controller.error(new win.DOMException('Aborted', 'AbortError'));
          };
          cleanupAbort = () => signal?.removeEventListener('abort', abortStream);
          if (signal?.aborted) {
            abortStream();
            return;
          }
          signal?.addEventListener('abort', abortStream, { once: true });
          controller.enqueue(encoder.encode(createChatSseChunk('Partial ')));
        },
        cancel() {
          cleanupAbort();
        },
      });

      return new win.Response(stream, {
        status: 200,
        headers: { 'Content-Type': 'text/event-stream; charset=utf-8' },
      });
    }

    function installSlowStreamFetchMock(win) {
      const originalFetch = win.fetch.bind(win);
      let intercepted = false;

      win.fetch = (resource, options = {}) => {
        const rawUrl = typeof resource === 'string' ? resource : resource?.url;
        const url = new URL(rawUrl, win.location.href);
        const body = String(options?.body || '');

        if (url.pathname === '/api/chat/completions' && body.includes('slow response please')) {
          intercepted = true;
          return Promise.resolve(createAbortableSlowResponse(win, options?.signal));
        }

        return originalFetch(resource, options);
      };

      return {
        restore() {
          win.fetch = originalFetch;
        },
        wasIntercepted() {
          return intercepted;
        },
      };
    }

    async function main() {
      localStorage.clear();

      const sanitized = sanitizeHTML('<a href="\tjavascript:alert(1)">bad</a><img src="\nJaVaScRiPt:alert(1)">');
      if (!sanitized.includes('href="#"') || sanitized.includes('src=')) {
        fail('sanitizer should block whitespace-obfuscated javascript URLs');
      }
      const sanitizedStyle = sanitizeHTML('<span class="katex" style="position:fixed;inset:0">x</span><div style="color:red">y</div>');
      if (sanitizedStyle.includes('style=') || !sanitizedStyle.includes('class="katex"')) {
        fail('sanitizer should remove inline styles while preserving safe classes');
      }
      const renderedArrayContent = renderMarkdown([
        { type: 'text', text: '数组形态第一行' },
        { type: 'text', content: '数组形态第二行' },
      ]);
      if (!renderedArrayContent.includes('数组形态第一行') || !renderedArrayContent.includes('数组形态第二行')) {
        fail('AI markdown renderer should support array-shaped assistant content');
      }

      const frame = document.getElementById('app-frame');
      const frameLocation = new URL(frame.src, window.location.href);
      if (frameLocation.pathname !== '/index.html') {
        fail(`iframe src 应直接指向 /index.html，当前是 ${frameLocation.pathname}`);
      }

      let doc = await waitForAppReady(frame);
      let win = frame.contentWindow;
      if (!win) fail('iframe window not accessible');

      const powershellCode = [
        '$ErrorActionPreference = "Stop"',
        '$AppId = "abc123"',
        '$LogPath = "$env:TEMP\\zhida.log"',
        'Write-Host "App: $AppId"',
      ].join('\n');
      const powershellMarkdown = [
        'Inline code: `$InlineVar = "$AppId"`',
        '',
        'Inline math: $x + y$',
        '',
        '```powershell',
        powershellCode,
        '```',
      ].join('\n');
      const regressionConversation = {
        id: 'markdown-regression',
        title: 'Markdown regression',
        modelId: 'smoke-standard',
        createdAt: Date.now(),
        updatedAt: Date.now(),
        pinned: false,
        tags: [],
        messages: [{
          id: 'markdown-regression-ai',
          role: 'ai',
          content: powershellMarkdown,
          timestamp: Date.now(),
        }],
      };
      win.localStorage.setItem('ai_chat_conversations', JSON.stringify([regressionConversation]));
      win.localStorage.setItem('ai_chat_active_id', JSON.stringify(regressionConversation.id));
      const regressionDoc = await reloadAppFrame(frame);
      const markdownProbe = await waitFor(
        () => regressionDoc.querySelector('.message--ai .message__content'),
        'PowerShell Markdown regression message rendered'
      );
      const codeBlock = requireElement('.code-block', markdownProbe, 'PowerShell Markdown regression');
      const renderedCodeText = safeText('pre code', codeBlock);
      if (!renderedCodeText.includes('$AppId') || !renderedCodeText.includes('$LogPath') || !renderedCodeText.includes('$ErrorActionPreference')) {
        fail('PowerShell fenced code should preserve literal $variables');
      }
      const inlineCode = requireElement('p code', markdownProbe, 'PowerShell inline code regression');
      if (!inlineCode.textContent.includes('$InlineVar') || inlineCode.querySelector('.katex, .math-inline') || inlineCode.innerHTML.includes('%%MATH_INLINE_')) {
        fail('PowerShell inline code should preserve literal $variables without math rendering');
      }
      if (codeBlock.querySelector('.katex, .math-inline') || codeBlock.innerHTML.includes('%%MATH_INLINE_')) {
        fail('math placeholders and KaTeX should not appear inside fenced code blocks');
      }
      const copyButton = requireElement('.code-block__copy', codeBlock, 'PowerShell code copy button');
      if (!copyButton.dataset.code || decodeURIComponent(copyButton.dataset.code) !== powershellCode) {
        fail('code copy data should decode to the raw fenced code');
      }
      if (copyButton.querySelector('svg, rect, path')) {
        fail('code copy button should not contain nested SVG markup');
      }
      if (!markdownProbe.querySelector('.math-inline .katex')) {
        fail('inline math outside code should still render with KaTeX');
      }

      const sanitizedNestedSvg = sanitizeHTML('<div><span>ok</span><svg><g><path d="M0 0"/></g></svg></div>');
      if (/(<svg|<g|<path|<rect)\b/i.test(sanitizedNestedSvg)) {
        fail('sanitizer should remove nested SVG markup after unwrapping disallowed elements');
      }
      win.localStorage.clear();
      doc = await reloadAppFrame(frame);
      win = frame.contentWindow;
      if (!win) fail('iframe window not accessible after Markdown regression reload');
      win.confirm = () => true;
      win.prompt = () => 'smokeTag';

      const freshState = await waitFor(() => getFreshStateSnapshot(doc), 'fresh empty/welcome state');
      const messageArea = doc.querySelector('#chat-messages-inner');
      const isWelcomeVisible = freshState?.kind === 'welcome';
      const isConversationListEmpty = freshState?.kind === 'list-empty' || freshState?.kind === 'no-users';
      if (!isWelcomeVisible && !isConversationListEmpty) {
        fail(`fresh state should show welcome screen 或对话列表空态，当前状态=${freshState?.kind || 'unknown'}`);
      }
      if (isWelcomeVisible) {
        const welcomeCards = messageArea.querySelectorAll('.welcome-card');
        if (!messageArea.querySelector('.welcome-screen__cards')) {
          fail('welcome screen 的卡片区应存在');
        }
        if (welcomeCards.length !== 6) {
          fail(`welcome screen 应包含 6 张快捷卡片，当前为 ${welcomeCards.length} 张`);
        }

        const welcomeCard = welcomeCards[0];
        const welcomeCardPrompt = welcomeCard?.dataset?.prompt?.trim()
          || safeText('.welcome-card__text', welcomeCard).trim();
        if (!welcomeCardPrompt) {
          fail('欢迎卡片缺少可填充的 prompt 文案');
        }

        const beforeWelcomeUserCount = doc.querySelectorAll('.message--user').length;
        const beforeWelcomeAiCount = doc.querySelectorAll('.message--ai .message__content').length;
        click(welcomeCard);
        await waitFor(
          () => safeValue('#chat-input', doc) === welcomeCardPrompt,
          'welcome card fills chat input'
        );

        if (
          doc.querySelectorAll('.message--user').length !== beforeWelcomeUserCount
          || doc.querySelectorAll('.message--ai .message__content').length !== beforeWelcomeAiCount
        ) {
          fail('点击欢迎卡片不应自动发送用户消息');
        }

        inputBySelector('#chat-input', '', doc, '清空欢迎卡片预填充文本');

        clickBySelector('#welcome-focus-input-btn', doc, '点击欢迎页开始提问');
        await waitFor(
          () => doc.activeElement === doc.querySelector('#chat-input'),
          'welcome start asking focuses composer'
        );
        clickBySelector('#welcome-open-settings-btn', doc, '点击欢迎页配置 API');
        await waitFor(
          () => doc.querySelector('#settings-modal')?.classList.contains('visible'),
          'welcome configure API opens settings'
        );
        clickBySelector('#settings-modal .modal__close', doc, '关闭欢迎页打开的设置弹窗');
        await waitFor(
          () => doc.querySelector('#settings-modal')?.getAttribute('aria-hidden') === 'true',
          'welcome settings modal closes'
        );
        clickBySelector('#welcome-import-data-btn', doc, '点击欢迎页导入数据');
        await waitFor(
          () => doc.querySelector('#data-management-modal')?.classList.contains('visible'),
          'welcome import data opens data modal'
        );
        clickBySelector('#data-management-modal .modal__close', doc, '关闭欢迎页打开的数据弹窗');
        await waitFor(
          () => doc.querySelector('#data-management-modal')?.getAttribute('aria-hidden') === 'true',
          'welcome data modal closes'
        );
      }
      await waitFor(() => safeInnerHTML('#theme-toggle', doc).trim(), 'theme icon render');
      if (doc.querySelectorAll('.message--user').length > 0) {
        fail('empty state 应为无消息；不应出现历史消息');
      }

      assertDesignRadiusConsistency(win, doc);
      assertFocusVisible(doc, '#settings-btn', 'settings按钮 focus-visible');
      const sidebarActionButtons = [
        requireElement('#export-btn', doc, '检查侧边栏底部导出按钮'),
        requireElement('#data-management-btn', doc, '检查侧边栏底部数据管理按钮'),
        requireElement('#prompt-templates-btn', doc, '检查侧边栏底部提示词模板按钮'),
        requireElement('#shortcuts-btn', doc, '检查侧边栏底部快捷键按钮'),
        requireElement('#clear-all-btn', doc, '检查侧边栏底部清空按钮'),
      ];
      const sidebarActionParents = new Set(sidebarActionButtons.map((button) => button.parentElement));
      if (sidebarActionParents.size > 1) {
        fail('compact sidebar menu should keep the bottom actions in a unified toolbar container');
      }
      assertElementsExist(doc, [
        '#export-btn',
        '#data-management-btn',
        '#prompt-templates-btn',
        '#shortcuts-btn',
        '#clear-all-btn',
      ], '侧边栏底部动作按钮');
      assertElementsExist(doc, [

          fail('stop button should remain large enough while generating');
        }
        clickBySelector('.stop-btn__label', doc, '点击停止按钮');
        await waitFor(
          () => !doc.querySelector('.loading-indicator'),
          'loading indicator hidden after stop'
        );
        await waitFor(
          () => doc.querySelector('#stop-btn')?.classList.contains('hidden'),
          'stop button should return hidden after abort'
        );
        if (requireElement('#send-btn', doc, '检查发送按钮显示状态').classList.contains('hidden')) {
          fail('send button should reappear after stop');
        }
        if (requireElement('#send-btn', doc, '检查附件态发送按钮恢复').disabled) {
          fail('send button should re-enable after stop when an attachment is queued');
        }
        if (requireElement('.chat-area', doc, '检查停止后 aria-busy').getAttribute('aria-busy') !== 'false') {
          fail('chat area should clear aria-busy after stop');
        }
        if (safeText('#composer-status', doc).trim() !== '') {
          fail('composer status should clear after stop');
        }
      } finally {
        slowStreamMock.restore();
      }

      inputBySelector('#chat-input', 'follow up after stop', doc, '输入中断后消息');
      clickBySelector('#send-btn', doc, '发送中断后消息');

      await waitFor(
        () => doc.querySelectorAll('.message--user').length >= 2,
        'follow-up user message appended'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Smoke test reply')),
        'follow-up reply after abort'
      );
      await waitFor(
        () => doc.querySelector('#stop-btn')?.classList.contains('hidden'),
        'stop button hidden after follow-up completes'
      );

      clickBySelector('#new-chat-btn', doc, '恢复到新对话');
      await waitFor(
        () => doc.querySelectorAll('.conversation-item').length >= 2,
        'conversation list updated'
      );
      const previousConversation = Array.from(doc.querySelectorAll('.conversation-item'))
        .find((item) => item.textContent.includes('slow response please'));
      if (!previousConversation) {
        fail('previous conversation should remain in the sidebar after rerender');
      }
      click(previousConversation);
      const activePreviousConversation = await waitFor(
        () => findByText('.conversation-item.active', 'slow response please', doc),
        'previous conversation active in sidebar'
      );
      const deleteButton = requireElement('.conversation-item__delete', activePreviousConversation, '获取会话删除按钮');
      assertUsableAfterInteraction(win, deleteButton, '侧边栏会话删除按钮应在 hover/focus 后可用');
      deleteButton.focus();
      await waitFor(
        () => win.getComputedStyle(deleteButton).opacity === '1',
        'conversation delete visible on keyboard focus'
      );
      await waitFor(
        () => Array.from(doc.querySelectorAll('.message--ai .message__content')).some((node) => node.textContent.includes('Partial')),
        'partial response persisted after rerender'
      );

      const aiMessages = Array.from(doc.querySelectorAll('.message--ai .message__content'))
        .map((node) => node.textContent.trim())
        .filter(Boolean);
      if (!aiMessages.some((text) => text.includes('Partial'))) {
        fail('partial response should persist after manual stop');
      }
      if (!aiMessages.some((text) => text.includes('Smoke test reply'))) {
        fail('follow-up response should complete after aborting the previous stream');
      }
      if (doc.querySelector('.loading-indicator')) {
        fail('loading indicator should be cleaned up after abort and follow-up send');
      }

      const backup = {
        version: 1,
        exportedAt: '2026/05/13 12:00:00',
        settings: JSON.parse(win.localStorage.getItem('ai_chat_settings') || '{}'),
        conversations: JSON.parse(win.localStorage.getItem('ai_chat_conversations') || '[]'),
        activeConversationId: JSON.parse(win.localStorage.getItem('ai_chat_active_id') || 'null'),
        selectedModelId: JSON.parse(win.localStorage.getItem('ai_chat_model') || 'null'),
        models: JSON.parse(win.localStorage.getItem('ai_chat_models') || '[]'),
        promptTemplates: JSON.parse(win.localStorage.getItem('ai_chat_prompt_templates') || '[]'),
      };
      if ('apiKey' in backup.settings) {
        fail('backup settings should not contain apiKey');
      }

      clickBySelector('#clear-all-btn', doc, '清空全部会话');
      await waitFor(
        () => doc.querySelector('#confirm-modal')?.classList.contains('visible'),
        'clear all confirmation visible'
      );
      clickBySelector('#confirm-ok-btn', doc, '确认清空');
      await waitFor(
        () => doc.querySelectorAll('.conversation-item').length === 0,
        'conversations cleared before import'
      );
      win.localStorage.removeItem('ai_chat_prompt_templates');

      clickBySelector('#data-management-btn', doc, '打开数据管理');
      await waitFor(
        () => doc.querySelector('#data-management-modal')?.classList.contains('visible'),
        'data management modal open'
      );
      const file = new win.File([JSON.stringify(backup)], 'backup.json', { type: 'application/json' });
      const transfer = new win.DataTransfer();
      transfer.items.add(file);
      const importInput = requireElement('#import-data-input', doc, '获取导入输入框');
      importInput.files = transfer.files;
      dispatchBySelector('#import-data-input', new Event('change', { bubbles: true }), doc, '触发导入');
      await waitFor(
        () => findByText('.conversation-item', 'hello smoke', doc),
        'conversation restored after data import'
      );
      clickBySelector('#data-management-modal .modal__close', doc, '关闭数据管理弹窗');
      clickBySelector('#prompt-templates-btn', doc, '打开模板管理');
      await waitFor(
        () => findByText('.template-item', 'Smoke Template', doc),
        'custom template restored after data import'
      );
      assertElementsExist(doc, [
        '#data-management-modal',
        '#export-all-data-btn',
        '#import-data-input',
        '#import-data-btn',
        '#prune-conversation-limit',
        '#prune-conversations-btn',
        '#prompt-templates-modal',
        '#prompt-template-form',
        '#prompt-template-list',
      ], '数据/模板管理关键选择器');

      document.body.dataset.smokeResult = 'pass';
      log('PASS');
    }

    main().catch((error) => {
      document.body.dataset.smokeResult = 'fail';
      log(error?.stack || String(error));
    });
  </script>
</body>
</html>
